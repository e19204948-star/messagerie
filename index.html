<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Firebase</title>
    <style>
        /* --- DESIGN WHATSAPP --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #d1d7db; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        
        #login-container { background: white; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #login-container input { display: block; width: 250px; padding: 12px; margin: 10px auto; border: 1px solid #ddd; border-radius: 6px; }
        #login-container button { width: 250px; padding: 12px; background: #00a884; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        #chat-app { width: 95%; max-width: 1400px; height: 95vh; background: #f0f2f5; display: none; box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
        
        /* Barre Latérale */
        .sidebar { width: 350px; background: white; border-right: 1px solid #d1d7db; display: flex; flex-direction: column; }
        .sidebar-header { background: #f0f2f5; padding: 15px; font-weight: bold; font-size: 18px; color: #54656f; }
        #user-list { flex: 1; overflow-y: auto; }
        .user-card { padding: 15px; border-bottom: 1px solid #f0f2f5; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .user-card:hover { background: #f5f6f6; }
        .user-info { margin-left: 15px; flex: 1; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; }
        .online { background: #1fa33f; }
        .offline { background: #8696a0; }

        /* Fenêtre de Chat */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #efeae2 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .chat-header { background: #f0f2f5; padding: 10px 20px; border-bottom: 1px solid #d1d7db; color: #54656f; font-weight: bold; }
        
        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* Bulles WhatsApp */
        .msg { max-width: 65%; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; font-size: 14.2px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.1); }
        .sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .received { background: #ffffff; align-self: flex-start; border-top-left-radius: 0; }
        .sender-name { font-size: 11px; font-weight: bold; color: #128c7e; margin-bottom: 2px; }
        .msg-time { font-size: 10px; color: #667781; text-align: right; margin-top: 4px; }

        /* Barre de saisie */
        .input-bar { background: #f0f2f5; padding: 10px 15px; display: flex; align-items: center; }
        #msg-input { flex: 1; border: none; padding: 10px 15px; border-radius: 8px; outline: none; font-size: 15px; }
        #send-btn { background: none; border: none; margin-left: 10px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2 style="color: #00a884; margin-bottom: 20px;">Inscription</h2>
        <input type="text" id="fname" placeholder="Prénom (ex: Jean)">
        <input type="text" id="lname" placeholder="Nom">
        <button onclick="joinChat()">REJOINDRE</button>
    </div>

    <div id="chat-app">
        <div class="sidebar">
            <div class="sidebar-header">Discussions</div>
            <div id="user-list"></div>
        </div>
        <div class="chat-window">
            <div class="chat-header">Groupe Général</div>
            <div id="messages-container"></div>
            <div class="input-bar">
                <input type="text" id="msg-input" placeholder="Tapez un message">
                <button id="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // CONFIGURATION
        const firebaseConfig = {
            databaseURL: "https://messagerie-cd2ba-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "messagerie-cd2ba"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = null;

        function joinChat() {
            const first = document.getElementById('fname').value.trim();
            const last = document.getElementById('lname').value.trim();
            
            if (first && last) {
                user = {
                    id: "u_" + Date.now(),
                    name: first + " " + last
                };

                document.getElementById('login-container').style.display = 'none';
                document.getElementById('chat-app').style.display = 'flex';

                initPresence();
                loadUsers();
                loadMessages();
            }
        }

        // Gestion du statut Online/Offline
        function initPresence() {
            const statusRef = db.ref('users/' + user.id);
            db.ref('.info/connected').on('value', (snap) => {
                if (snap.val() === true) {
                    statusRef.onDisconnect().set({ name: user.name, status: 'offline' });
                    statusRef.set({ name: user.name, status: 'online' });
                }
            });
        }

        // Afficher les contacts
        function loadUsers() {
            db.ref('users').on('value', (snapshot) => {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                snapshot.forEach((snap) => {
                    const u = snap.val();
                    const item = document.createElement('div');
                    item.className = 'user-card';
                    item.innerHTML = `
                        <div class="status-dot ${u.status}"></div>
                        <div class="user-info">
                            <strong>${u.name}</strong><br>
                            <small style="color:gray">${u.status === 'online' ? 'en ligne' : 'hors ligne'}</small>
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        // Envoyer message
        function sendMsg() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;

            db.ref('messages').push({
                uid: user.id,
                author: user.name,
                text: input.value,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            input.value = '';
        }

        // Charger messages
        function loadMessages() {
            const container = document.getElementById('messages-container');
            db.ref('messages').on('child_added', (snap) => {
                const m = snap.val();
                const type = m.uid === user.id ? 'sent' : 'received';
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${type}`;
                msgDiv.innerHTML = `
                    ${type === 'received' ? `<div class="sender-name">${m.author}</div>` : ''}
                    <div>${m.text}</div>
                    <div class="msg-time">${m.time}</div>
                `;
                container.appendChild(msgDiv);
                container.scrollTop = container.scrollHeight;
            });
        }

        // Touche Entrée pour envoyer
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === "Enter") sendMsg(); };
    </script>
</body>
</html>
