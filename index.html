<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie Privée Pro</title>
    <style>
        :root { --primary: #075e54; --light: #e5ddd5; --msg-in: #ffffff; --msg-out: #dcf8c6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* Auth Screen */
        #auth-screen { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Main App */
        #app-screen { display: none; width: 95%; height: 90vh; background: white; box-shadow: 0 2px 20px rgba(0,0,0,0.1); display: flex; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 30%; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #f0f0f0; }
        .header { padding: 15px; background: var(--primary); color: white; }
        #contact-list { flex-grow: 1; overflow-y: auto; }
        .contact-item { padding: 15px; border-bottom: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .contact-item:hover { background: #e9e9e9; }
        .contact-item.active { background: #fff; border-left: 5px solid var(--primary); }

        /* Chat Area */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .bubble { padding: 8px 12px; border-radius: 8px; margin: 5px 0; max-width: 70%; position: relative; }
        .sent { background: var(--msg-out); align-self: flex-end; }
        .received { background: var(--msg-in); align-self: flex-start; }
        
        #input-zone { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2 id="auth-title">Connexion</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="handleAuth()">Continuer</button>
        <p style="font-size: 12px; color: #666; cursor: pointer;" onclick="toggleAuthMode()">Pas de compte ? S'inscrire</p>
    </div>

    <div id="app-screen" style="display: none;">
        <div id="sidebar">
            <div class="header">
                <span id="my-name">Chargement...</span>
                <button onclick="logout()" style="width: auto; padding: 5px; font-size: 10px; margin-top: 5px;">Déconnexion</button>
            </div>
            <div style="padding: 10px;">
                <input type="text" id="new-contact-email" placeholder="Ajouter un email..." style="width: 70%; font-size: 12px;">
                <button onclick="addContact()" style="width: 25%; font-size: 12px; padding: 8px;">+</button>
            </div>
            <div id="contact-list"></div>
        </div>

        <div id="chat-area">
            <div id="messages">Sélectionnez un contact pour discuter</div>
            <div id="input-zone">
                <input type="text" id="msg-input" placeholder="Écrire un message...">
                <button onclick="sendMessage()" style="width: 80px;">Envoyer</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://messagerie-cd2ba-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userUID, userEmail, activeChatID = null;
        let isSignup = false;

        // --- GESTION AUTH ---
        window.toggleAuthMode = () => {
            isSignup = !isSignup;
            document.getElementById('auth-title').innerText = isSignup ? "Inscription" : "Connexion";
        };

        window.handleAuth = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const action = isSignup ? createUserWithEmailAndPassword : signInWithEmailAndPassword;
            
            action(auth, email, pass).then((res) => {
                // Enregistrer l'utilisateur dans la liste globale pour qu'il soit trouvable
                set(ref(db, 'users/' + res.user.uid), { email: email });
            }).catch(err => alert(err.message));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                userEmail = user.email;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                document.getElementById('my-name').innerText = userEmail;
                loadContacts();
            } else {
                document.getElementById('auth-screen').style.display = 'block';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        // --- GESTION CONTACTS ---
        window.addContact = () => {
            const emailToAdd = document.getElementById('new-contact-email').value;
            if(emailToAdd === userEmail) return;

            // On simplifie ici : on ajoute l'email directement dans une liste de contacts
            const contactId = btoa(emailToAdd).replace(/=/g, ""); // Créer un ID propre à partir de l'email
            set(ref(db, `contacts/${userUID}/${contactId}`), { email: emailToAdd });
            document.getElementById('new-contact-email').value = "";
        };

        function loadContacts() {
            onValue(ref(db, `contacts/${userUID}`), (snapshot) => {
                const list = document.getElementById('contact-list');
                list.innerHTML = "";
                snapshot.forEach(child => {
                    const contact = child.val();
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.innerText = contact.email;
                    div.onclick = () => startChat(contact.email);
                    list.appendChild(div);
                });
            });
        }

        // --- GESTION MESSAGES ---
        function startChat(otherEmail) {
            // Créer un ID de discussion unique (tri alphabétique pour que A->B et B->A soit le même canal)
            const id1 = userEmail.replace(/[.@]/g, "");
            const id2 = otherEmail.replace(/[.@]/g, "");
            activeChatID = [id1, id2].sort().join("_");
            
            document.getElementById('messages').innerHTML = "Chargement...";
            loadMessages();
        }

        function loadMessages() {
            if(!activeChatID) return;
            onValue(ref(db, 'chats/' + activeChatID), (snapshot) => {
                const container = document.getElementById('messages');
                container.innerHTML = "";
                snapshot.forEach(child => {
                    const data = child.val();
                    const div = document.createElement('div');
                    div.className = `bubble ${data.sender === userEmail ? 'sent' : 'received'}`;
                    div.innerText = data.text;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMessage = () => {
            const text = document.getElementById('msg-input').value;
            if(!activeChatID || text.trim() === "") return;

            push(ref(db, 'chats/' + activeChatID), {
                sender: userEmail,
                text: text,
                timestamp: serverTimestamp()
            });
            document.getElementById('msg-input').value = "";
        };
    </script>
</body>
</html>
